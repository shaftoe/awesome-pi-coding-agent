name: Daily Pipeline

on:
  schedule:
   - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Run the data pipeline (discover → enrich → generate) ─────────────
  run-pipeline:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run pipeline
        run: bun run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet && git diff --cached --quiet && test -z "$(git ls-files --others --exclude-standard)"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
            git diff --cached --stat
            git ls-files --others --exclude-standard
          fi

      - name: Upload data artifacts
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-data
          path: |
            data/
            README.md

  # ── Job 2: Validate new/changed entries with Pi coding agent ────────────────
  validate-entries:
    needs: run-pipeline
    if: needs.run-pipeline.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: pipeline
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: pipeline-data
          path: .

      - name: Extract validation prompt
        id: prompt
        run: |
          TEXT=$(bun run validate-prompt)
          echo "text<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TEXT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate entries and apply fixes
        uses: shaftoe/pi-coding-agent-action@v2
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: ${{ vars.PROVIDER }}
          model: ${{ vars.MODEL }}
          token: ${{ secrets.LLM_API_KEY }}
          thinking_level: ${{ vars.THINKING_LEVEL }}
          prompt: ${{ steps.prompt.outputs.text }}
          load_builtin_extensions: "false"

      - name: Regenerate README
        run: bun run generate

      - name: Upload fixed data artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-data
          path: |
            data/
            README.md

  # ── Job 3: Create PR with validated changes ─────────────────────────────────
  create-pr:
    needs: [run-pipeline, validate-entries]
    if: needs.run-pipeline.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: pipeline-data
          path: .

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="daily-pipeline-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: daily pipeline update $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: daily pipeline update $(date +%Y-%m-%d)" \
            --body "Automated pipeline run — enriched/validated data and regenerated README." \
            --base main \
            --head "$BRANCH"
