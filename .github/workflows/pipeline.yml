name: Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Run the data pipeline (discover → enrich → generate) ─────────────
  run-pipeline:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run pipeline
        run: bun run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Check for remaining duplicates
        run: bun run dedup --dry-run
        continue-on-error: true

      - name: Detect changed data files
        id: changes
        run: bun run src/ci/detect-changes.ts
        continue-on-error: true

      - name: Upload data artifacts
        if: steps.changes.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-data
          path: |
            data/
            README.md

  # ── Job 2: Validate new/changed entries with Pi coding agent ────────────────
  validate-entries:
    needs: run-pipeline
    if: needs.run-pipeline.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: pipeline-data
          path: .

      - name: Validate entries and apply fixes
        uses: shaftoe/pi-coding-agent-action@v2
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: ${{ vars.PROVIDER }}
          model: ${{ vars.MODEL }}
          token: ${{ secrets.LLM_API_KEY }}
          thinking_level: ${{ vars.THINKING_LEVEL }}
          prompt: |
            You are validating entries for the "Awesome Pi Coding Agent" curated list. This list tracks resources for the Pi coding agent at https://pi.dev/ — NOT Raspberry Pi hardware projects.

            Review the changed/added JSON files in the data/ directory (compare working tree against the git index to find them).

            For each changed data entry, verify and **fix in-place**:
            1. **Relevance**: The entry MUST be about the Pi coding agent (pi.dev). If it's about Raspberry Pi, GPIO, embedded hardware, or clearly unrelated — run `bun run blacklist add <url> <reason>` to blacklist and remove it.
            2. **English-only**: The entry's name and description MUST be in English. If the description or title is written in a non-English language (Chinese, Russian, Arabic, Hindi, Portuguese, German, etc.), run `bun run blacklist add <url> <reason>` to blacklist and remove it.
            3. **Duplicates**: Check for duplicate entries. If two entries share the same URL, ID, or GitHub URL, run `bun run dedup` to remove the lower-health duplicate. Use `bun run dedup --dry-run` first to inspect.
            4. **Health score accuracy**: health.score (0-100) maps to health.level as: active ≥70, maintained ≥40, stale ≥15, dead <15. If inconsistent with metadata (last_commit date, stars, forks, is_archived), edit the JSON file directly to fix health.score and health.level.
            5. **Category correctness**: The category is determined by the subfolder under data/ (e.g. data/extensions/ → category=extension). If the entry belongs in a different category, move the JSON file to the correct folder and update the category field in the JSON file.

            Make all fixes directly. Do not just report issues — edit files, run commands, and resolve them.
          load_builtin_extensions: "false"

      - name: Upload fixed data artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-data
          path: |
            data/
            README.md

  # ── Job 3: Create PR with validated changes ─────────────────────────────────
  create-pr:
    needs: [run-pipeline, validate-entries]
    if: needs.run-pipeline.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: pipeline-data
          path: .

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create PR
        run: bun run src/ci/create-pr.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
