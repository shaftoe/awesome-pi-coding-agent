pre-commit:
  parallel: false
  commands:
    format:
      run: bun run format
      stage_fixed: true
    lint:
      run: bun run lint:fix
      stage_fixed: true
    validate:
      run: bun run check
    generate:
      run: bun run generate
      stage_fixed: true

pre-push:
  commands:
    validate:
      run: bun run check
    test:
      run: bun test
